<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKPOINT · 키워드</title>
<style>
:root {
  --bg0:#0c0c0c; --bg1:#161616; --bg2:#1f1f1f; --bg3:#282828;
  --line:#2e2e2e; --t1:#f0f0f0; --t2:#888; --t3:#555;
  --blue:#3b82f6; --blue-dim:#1d4ed8; --blue-bg:rgba(59,130,246,.1);
  --green:#22c55e; --yellow:#f59e0b; --orange:#f97316; --red:#ef4444;
  --r:6px; --font:'Pretendard','Noto Sans KR',-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg0);color:var(--t1);font-family:var(--font);min-height:100vh;line-height:1.5}
button{cursor:pointer;border:none;background:none;font-family:inherit}
select,input{font-family:inherit}

/* 헤더 */
header{display:flex;align-items:center;gap:10px;padding:0 24px;height:52px;background:var(--bg1);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;letter-spacing:-1px}
.logo-text{font-size:13px;font-weight:700;letter-spacing:.04em}
.logo-sub{font-size:11px;color:var(--t3);letter-spacing:.08em;margin-left:2px}
header .sp{flex:1}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--t3);display:inline-block;margin-right:6px}
.hdot.ok{background:var(--green)}
#hstatus{font-size:11px;color:var(--t2)}

/* 레이아웃 */
.layout{display:grid;grid-template-columns:272px 1fr;min-height:calc(100vh - 52px)}

/* 사이드바 */
.sidebar{background:var(--bg1);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.slabel{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:8px}

/* 카테고리 드롭다운 */
.cat-wrap{position:relative}
.cat-sel{
  width:100%;padding:8px 32px 8px 10px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);
  color:var(--t1);font-size:13px;appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23555' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;
  transition:border-color .15s;
}
.cat-sel:hover{border-color:var(--t3)}
.cat-sel:focus{outline:none;border-color:var(--blue)}
.cat-sel:disabled{opacity:.35;cursor:not-allowed}
.cat-loading{position:absolute;right:28px;top:50%;transform:translateY(-50%);display:none}
.cat-loading.show{display:block}
.mini-spin{width:12px;height:12px;border:2px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cat-path{font-size:10px;color:var(--t3);margin-top:4px;min-height:14px}

/* 기간 탭 */
.period-tabs{display:flex;background:var(--bg2);border-radius:var(--r);border:1px solid var(--line);overflow:hidden}
.ptab{flex:1;padding:7px 0;font-size:12px;font-weight:500;color:var(--t2);text-align:center;transition:background .15s,color .15s}
.ptab.active{background:var(--blue);color:#fff}

/* 필터 칩 */
.filter-block{display:flex;flex-direction:column;gap:10px}
.fname{font-size:11px;color:var(--t2);margin-bottom:4px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:var(--bg2);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--t1)}
.chip.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:600}

/* 조회 버튼 */
.btn-query{width:100%;padding:11px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border-radius:var(--r);transition:background .15s,opacity .15s;letter-spacing:.02em}
.btn-query:hover:not(:disabled){background:var(--blue-dim)}
.btn-query:disabled{opacity:.4;cursor:not-allowed}

/* 메인 */
.main{display:flex;flex-direction:column;overflow:hidden}
.result-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--bg1);flex-shrink:0}
.rcount{font-size:18px;font-weight:700}
.rcount span{color:var(--blue)}
.rmeta{font-size:11px;color:var(--t2)}
.result-bar .sp{flex:1}
.btn-xl{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);color:var(--t2);font-size:12px;font-weight:600;transition:all .15s}
.btn-xl:hover:not(:disabled){border-color:var(--green);color:var(--green);background:rgba(34,197,94,.07)}
.btn-xl:disabled{opacity:.3;cursor:not-allowed}

/* 툴바 */
.toolbar{display:flex;align-items:center;gap:10px;padding:8px 18px;border-bottom:1px solid var(--line);background:var(--bg0);flex-shrink:0}
.search-inp{padding:6px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);color:var(--t1);font-size:12px;width:190px;transition:border-color .15s}
.search-inp::placeholder{color:var(--t3)}
.search-inp:focus{outline:none;border-color:var(--blue)}
.rcnt{font-size:11px;color:var(--t3);margin-left:auto}

/* 테이블 */
.tbl-wrap{flex:1;overflow:auto;position:relative}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:880px}
thead tr{background:var(--bg2);position:sticky;top:0;z-index:10}
th{padding:9px 11px;text-align:left;color:var(--t2);font-weight:600;font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t1)}
th.sorted{color:var(--blue)}
th i{margin-left:3px;opacity:.4;font-style:normal;font-size:10px}
th.sorted i{opacity:1}
td{padding:8px 11px;border-bottom:1px solid var(--line);color:var(--t1);white-space:nowrap}
tbody tr:hover td{background:var(--bg1)}
.n{text-align:right;font-variant-numeric:tabular-nums}
.kw{font-weight:600;font-size:13px;max-width:150px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.kw:hover{color:var(--blue)}
.cat2{color:var(--t2);font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b쇼핑성{background:rgba(59,130,246,.15);color:#60a5fa}
.b정보성{background:rgba(168,85,247,.15);color:#c084fc}
.g아주좋음{color:var(--green);font-weight:700}
.g좋음{color:#86efac}
.g보통{color:var(--yellow)}
.g나쁨{color:var(--orange)}
.g아주나쁨{color:var(--red)}

/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;min-height:320px;color:var(--t3)}
.empty-ico{font-size:32px;opacity:.25}
.empty-tit{font-size:14px;font-weight:600;color:var(--t2)}
.empty-sub{font-size:12px}

/* 로딩 오버레이 */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.88);backdrop-filter:blur(4px);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#overlay.show{display:flex}
.spin-lg{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
#otimer{font-size:28px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.omsg{font-size:14px;font-weight:600}
.osub{font-size:12px;color:var(--t2)}

/* 토스트 */
#toast{position:fixed;bottom:22px;right:22px;padding:9px 16px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--r);font-size:12px;color:var(--t1);z-index:9999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.err{border-color:var(--red);color:var(--red)}
#toast.ok{border-color:var(--green);color:var(--green)}

/* 스크롤바 */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo-mark">BP</div>
  <span class="logo-text">BLACKPOINT</span>
  <span class="logo-sub">키워드</span>
  <div class="sp"></div>
  <span class="hdot" id="hdot"></span>
  <span id="hstatus">연결 중...</span>
</header>

<div class="layout">
  <aside class="sidebar">

    <!-- 카테고리 -->
    <div>
      <div class="slabel">카테고리</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div class="cat-wrap">
          <select class="cat-sel" id="c1" disabled><option value="">1차 카테고리</option></select>
          <div class="cat-loading" id="l1"><div class="mini-spin"></div></div>
        </div>
        <div class="cat-wrap">
          <select class="cat-sel" id="c2" disabled><option value="">2차 카테고리</option></select>
          <div class="cat-loading" id="l2"><div class="mini-spin"></div></div>
        </div>
        <div class="cat-wrap">
          <select class="cat-sel" id="c3" disabled><option value="">3차 카테고리</option></select>
          <div class="cat-loading" id="l3"><div class="mini-spin"></div></div>
        </div>
        <div class="cat-wrap">
          <select class="cat-sel" id="c4" disabled><option value="">4차 카테고리</option></select>
          <div class="cat-loading" id="l4"><div class="mini-spin"></div></div>
        </div>
        <div class="cat-path" id="catpath"></div>
      </div>
    </div>

    <!-- 기간 -->
    <div>
      <div class="slabel">기간</div>
      <div class="period-tabs">
        <button class="ptab active" data-p="30d">최근 30일</button>
        <button class="ptab" data-p="custom">과거 선택</button>
      </div>
    </div>

    <!-- 필터 -->
    <div>
      <div class="slabel">필터</div>
      <div class="filter-block">
        <div>
          <div class="fname">키워드 유형</div>
          <div class="chips">
            <button class="chip active" data-f="keywordType" data-v="all">전체</button>
            <button class="chip" data-f="keywordType" data-v="shopping">쇼핑성</button>
            <button class="chip" data-f="keywordType" data-v="info">정보성</button>
          </div>
        </div>
        <div>
          <div class="fname">성별</div>
          <div class="chips">
            <button class="chip active" data-f="gender" data-v="all">전체</button>
            <button class="chip" data-f="gender" data-v="male">남성</button>
            <button class="chip" data-f="gender" data-v="female">여성</button>
          </div>
        </div>
        <div>
          <div class="fname">기타</div>
          <div class="chips">
            <button class="chip" data-f="excludeBrand" data-v="toggle">브랜드 제외</button>
            <button class="chip" data-f="isNew" data-v="1month">신규(1달)</button>
            <button class="chip" data-f="isNew" data-v="1year">신규(1년)</button>
          </div>
        </div>
      </div>
    </div>

    <div style="flex:1"></div>
    <button class="btn-query" id="btnq" disabled>카테고리를 선택하세요</button>
  </aside>

  <main class="main">
    <div class="result-bar">
      <div>
        <div class="rcount" id="rcount">—</div>
        <div class="rmeta" id="rmeta">카테고리를 선택하고 조회하세요</div>
      </div>
      <div class="sp"></div>
      <button class="btn-xl" id="btnxl" disabled>↓ 엑셀 다운로드</button>
    </div>
    <div class="toolbar">
      <input class="search-inp" id="srch" placeholder="키워드 검색..." disabled>
      <span class="rcnt" id="rcnt"></span>
    </div>
    <div class="tbl-wrap" id="tbl">
      <div class="empty">
        <div class="empty-ico">🔍</div>
        <div class="empty-tit">데이터 없음</div>
        <div class="empty-sub">카테고리 선택 후 조회하세요</div>
      </div>
    </div>
  </main>
</div>

<div id="overlay">
  <div class="spin-lg"></div>
  <div id="otimer">0s</div>
  <div class="omsg">키워드 수집 중...</div>
  <div class="osub">브라우저를 닫지 마세요 · 보통 30~60초 소요</div>
</div>
<div id="toast"></div>

<script>
const API_KEY = 'blackpoint-kw-2026-xQ9mZ3';
const H = { 'x-api-key': API_KEY, 'Content-Type': 'application/json' };

const S = {
  catId: null, period: '30d',
  filters: { keywordType:'all', gender:'all', excludeBrand:false, isNew:null },
  data: [], filtered: [],
  sortCol: 'rank', sortDir: 'asc',
};

/* ── 초기화 ─────────────────────────────────── */
async function init() {
  checkHealth();
  await loadRoot();
  bindAll();
}

async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('hdot').classList.add('ok');
    document.getElementById('hstatus').textContent = '서버 정상';
  } catch { document.getElementById('hstatus').textContent = '연결 실패'; }
}

/* ── 1차: 즉시 로드 ──────────────────────────── */
async function loadRoot() {
  setLoading('l1', true);
  try {
    const r = await fetch('/categories', { headers: H });
    const d = await r.json();
    fillSelect('c1', d.data, '1차 카테고리');
    document.getElementById('c1').disabled = false;
  } catch (e) { toast('카테고리 로드 실패', 'err'); }
  finally { setLoading('l1', false); }
}

/* ── N차 → 자식 로드 (온디맨드) ─────────────── */
async function loadChildren(parentId, targetId, placeholder, loaderId) {
  const sel = document.getElementById(targetId);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  sel.disabled = true;
  setLoading(loaderId, true);

  try {
    const r = await fetch(`/categories/children?id=${parentId}`, { headers: H });
    const d = await r.json();
    if (!d.data || d.data.length === 0) return; // isLeaf
    fillSelect(targetId, d.data, placeholder);
    sel.disabled = false;
  } catch (e) { toast('카테고리 로드 실패', 'err'); }
  finally { setLoading(loaderId, false); }
}

function fillSelect(id, items, placeholder) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  items.forEach(item => {
    const o = document.createElement('option');
    o.value = item.id;
    o.textContent = item.name;
    o.dataset.isLeaf = item.isLeaf;
    sel.appendChild(o);
  });
}

function resetBelow(level) {
  // level=1이면 2,3,4 리셋 / level=2이면 3,4 리셋 ...
  for (let i = level + 1; i <= 4; i++) {
    const sel = document.getElementById('c' + i);
    sel.innerHTML = `<option value="">${i}차 카테고리</option>`;
    sel.disabled = true;
  }
}

/* ── 이벤트 ─────────────────────────────────── */
function bindAll() {
  // 카테고리 드롭다운
  document.getElementById('c1').addEventListener('change', async function() {
    resetBelow(1);
    S.catId = this.value ? Number(this.value) : null;
    updateQueryBtn();
    updatePath();
    if (!this.value) return;
    const opt = this.options[this.selectedIndex];
    if (opt.dataset.isLeaf !== '1')
      await loadChildren(this.value, 'c2', '2차 카테고리', 'l2');
  });

  document.getElementById('c2').addEventListener('change', async function() {
    resetBelow(2);
    S.catId = this.value ? Number(this.value) : Number(document.getElementById('c1').value);
    updateQueryBtn();
    updatePath();
    if (!this.value) return;
    const opt = this.options[this.selectedIndex];
    if (opt.dataset.isLeaf !== '1')
      await loadChildren(this.value, 'c3', '3차 카테고리', 'l3');
  });

  document.getElementById('c3').addEventListener('change', async function() {
    resetBelow(3);
    S.catId = this.value ? Number(this.value) : Number(document.getElementById('c2').value || document.getElementById('c1').value);
    updateQueryBtn();
    updatePath();
    if (!this.value) return;
    const opt = this.options[this.selectedIndex];
    if (opt.dataset.isLeaf !== '1')
      await loadChildren(this.value, 'c4', '4차 카테고리', 'l4');
  });

  document.getElementById('c4').addEventListener('change', function() {
    S.catId = this.value
      ? Number(this.value)
      : Number(document.getElementById('c3').value || document.getElementById('c2').value || document.getElementById('c1').value);
    updateQueryBtn();
    updatePath();
  });

  // 기간 탭
  document.querySelectorAll('.ptab').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
      b.classList.add('active');
      S.period = b.dataset.p;
    });
  });

  // 필터 칩
  document.querySelectorAll('.chip[data-f]').forEach(c => c.addEventListener('click', () => chipClick(c)));

  // 조회
  document.getElementById('btnq').addEventListener('click', runScrape);

  // 엑셀
  document.getElementById('btnxl').addEventListener('click', dlExcel);

  // 검색
  document.getElementById('srch').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    S.filtered = q ? S.data.filter(r => (r.keyword||'').toLowerCase().includes(q)) : [...S.data];
    renderTable(S.filtered);
  });

  // 테이블 정렬 (이벤트 위임)
  document.getElementById('tbl').addEventListener('click', e => {
    const th = e.target.closest('th[data-c]');
    if (th) {
      const col = th.dataset.c;
      S.sortDir = (S.sortCol === col) ? (S.sortDir==='asc'?'desc':'asc') : (col==='rank'?'asc':'desc');
      S.sortCol = col;
      renderTable(S.filtered);
    }
  });
}

function updateQueryBtn() {
  const btn = document.getElementById('btnq');
  btn.disabled = !S.catId;
  btn.textContent = S.catId ? '데이터 조회' : '카테고리를 선택하세요';
}

function updatePath() {
  const names = ['c1','c2','c3','c4'].map(id => {
    const s = document.getElementById(id);
    return s.value ? s.options[s.selectedIndex].text : null;
  }).filter(Boolean);
  document.getElementById('catpath').textContent = names.join(' › ');
}

function setLoading(id, on) {
  document.getElementById(id).classList.toggle('show', on);
}

function chipClick(chip) {
  const f = chip.dataset.f, v = chip.dataset.v;
  if (f === 'excludeBrand') {
    chip.classList.toggle('active');
    S.filters.excludeBrand = chip.classList.contains('active');
    return;
  }
  if (f === 'isNew') {
    const was = chip.classList.contains('active');
    document.querySelectorAll('.chip[data-f="isNew"]').forEach(c => c.classList.remove('active'));
    S.filters.isNew = was ? null : v;
    if (!was) chip.classList.add('active');
    return;
  }
  document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  S.filters[f] = v;
}

/* ── 수집 ────────────────────────────────────── */
async function runScrape() {
  if (!S.catId) return;
  const btn = document.getElementById('btnq');
  btn.disabled = true; btn.textContent = '수집 중...';
  showOverlay(true);
  try {
    const res = await fetch('/scrape', {
      method: 'POST', headers: H,
      body: JSON.stringify({ categoryId: S.catId, period: S.period, filters: { ...S.filters }, format: 'json' }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error||'수집 실패'); }
    const result = await res.json();
    S.data = result.data || [];
    S.filtered = [...S.data];

    const catName = getCatName();
    document.getElementById('rcount').innerHTML = `키워드 <span>${result.collectedCount.toLocaleString()}</span>개`;
    document.getElementById('rmeta').textContent = `${catName} · ${S.period==='30d'?'최근 30일':S.period} · ${Math.round((result.elapsedMs||0)/1000)}초 소요`;
    document.getElementById('btnxl').disabled = false;
    document.getElementById('srch').disabled = false;
    document.getElementById('srch').value = '';
    renderTable(S.data);
    toast(`${result.collectedCount}개 수집 완료`, 'ok');
  } catch(e) { toast('오류: '+e.message, 'err'); }
  finally {
    showOverlay(false);
    btn.disabled = false;
    btn.textContent = '다시 조회';
  }
}

function getCatName() {
  return ['c4','c3','c2','c1'].map(id => {
    const s = document.getElementById(id);
    return s.value ? s.options[s.selectedIndex].text : null;
  }).find(Boolean) || '';
}

/* ── 테이블 렌더 ─────────────────────────────── */
const COLS = [
  {c:'rank',             l:'순위',      x:'n'},
  {c:'keyword',          l:'키워드',    x:'kw'},
  {c:'category',         l:'대표 카테고리', x:'cat2'},
  {c:'keywordType',      l:'유형',      x:''},
  {c:'searchTotal',      l:'총검색수',  x:'n'},
  {c:'searchMobile',     l:'모바일',    x:'n'},
  {c:'productCount',     l:'상품수',    x:'n'},
  {c:'competition',      l:'경쟁강도',  x:'n'},
  {c:'adClickAvg',       l:'광고클릭',  x:'n'},
  {c:'adClickCompetition',l:'광고경쟁', x:'n'},
  {c:'adCostPerClick',   l:'클릭당광고비', x:'n'},
];

function renderTable(rows) {
  const wrap = document.getElementById('tbl');
  if (!rows || !rows.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">📭</div><div class="empty-tit">결과 없음</div><div class="empty-sub">필터를 변경해보세요</div></div>`;
    document.getElementById('rcnt').textContent = '';
    return;
  }
  const sorted = [...rows].sort((a,b) => {
    const va = a[S.sortCol]??0, vb = b[S.sortCol]??0, d = S.sortDir==='asc'?1:-1;
    return typeof va==='number' ? (va-vb)*d : String(va).localeCompare(String(vb),'ko')*d;
  });

  const head = COLS.map(col => {
    const s = S.sortCol===col.c;
    const ic = s ? (S.sortDir==='asc'?'↑':'↓') : '↕';
    return `<th data-c="${col.c}" class="${s?'sorted':''}">${col.l}<i>${ic}</i></th>`;
  }).join('');

  const body = sorted.map(row => {
    const cells = COLS.map(col => {
      const v = row[col.c];
      let c = '';
      if (col.c==='keyword')      c = `<span class="kw" title="${v||''}">${v||'-'}</span>`;
      else if (col.c==='category') c = `<span class="cat2" title="${v||''}">${v||'-'}</span>`;
      else if (col.c==='keywordType') c = `<span class="badge b${v||''}">${v||'-'}</span>`;
      else if (col.c==='competition') {
        const g = row.competitionGrade||'';
        c = `<span class="g${g}">${fmt(v)}${g?` <small style="opacity:.5;font-size:9px">(${g})</small>`:''}</span>`;
      }
      else c = fmt(v);
      return `<td class="${col.x}">${c}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  wrap.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  document.getElementById('rcnt').textContent = `${rows.length.toLocaleString()}개`;
}

function fmt(v) {
  if (v===null||v===undefined) return '-';
  if (typeof v==='number') return v.toLocaleString('ko-KR',{maximumFractionDigits:2});
  return v;
}

/* ── 엑셀 다운로드 ───────────────────────────── */
async function dlExcel() {
  if (!S.catId) return;
  const btn = document.getElementById('btnxl');
  btn.disabled = true; btn.textContent = '⏳ 준비 중...';
  try {
    const p = new URLSearchParams({
      categoryId: S.catId, period: S.period, format: 'csv',
      ...(S.filters.keywordType!=='all'&&{keywordType:S.filters.keywordType}),
      ...(S.filters.gender!=='all'&&{gender:S.filters.gender}),
      ...(S.filters.excludeBrand&&{excludeBrand:'true'}),
    });
    const res = await fetch(`/scrape?${p}`, { headers: { 'x-api-key': API_KEY } });
    if (!res.ok) throw new Error('다운로드 실패');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `keywords_${getCatName()}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('다운로드 완료', 'ok');
  } catch(e) { toast('오류: '+e.message, 'err'); }
  finally { btn.disabled = false; btn.innerHTML = '↓ 엑셀 다운로드'; }
}

/* ── 유틸 ────────────────────────────────────── */
let _ti = null;
function showOverlay(on) {
  const el = document.getElementById('overlay');
  if (on) {
    el.classList.add('show');
    let s = 0;
    document.getElementById('otimer').textContent = '0s';
    _ti = setInterval(() => { s++; document.getElementById('otimer').textContent = s+'s'; }, 1000);
  } else {
    el.classList.remove('show');
    clearInterval(_ti);
  }
}

let _tt = null;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show'+(type?' '+type:'');
  clearTimeout(_tt); _tt = setTimeout(() => { el.className = ''; }, 3000);
}

init();
</script>
